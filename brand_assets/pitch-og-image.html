<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Pitch. — OG Image Template (1200×630)</title>
<style>
  @font-face {
    font-family: 'Fraunces';
    src: url('/fonts/fraunces.woff2') format('woff2');
    font-weight: 300 900;
    font-display: block;
  }
  @font-face {
    font-family: 'Instrument Sans';
    src: url('/fonts/instrument-sans.woff2') format('woff2');
    font-weight: 400 700;
    font-display: block;
  }
  html, body { margin: 0; padding: 0; background: #000; }
  .og {
    width: 1200px;
    height: 630px;
    position: relative;
    background:
      radial-gradient(60% 60% at 50% 45%, rgba(232,80,10,0.22) 0%, rgba(26,22,18,0) 60%),
      #1A1612;
    color: #FDF4E7;
    font-family: 'Instrument Sans', 'Helvetica Neue', Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    overflow: hidden;
  }
  .wordmark {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 900;
    font-size: 220px;
    line-height: 1;
    letter-spacing: -6px;
    margin: 0;
  }
  .wordmark .dot { color: #E8500A; }
  .rule {
    width: 240px;
    height: 4px;
    background: #E8500A;
    border-radius: 2px;
    margin: 36px 0 32px;
  }
  .subtitle {
    font-weight: 400;
    font-size: 30px;
    color: #A89880;
    margin: 0;
  }
  .url {
    position: absolute;
    bottom: 60px;
    left: 0;
    right: 0;
    font-weight: 600;
    font-size: 22px;
    color: #6B5A4A;
    letter-spacing: 4px;
  }
</style>
</head>
<body>
  <div class="og" id="og">
    <h1 class="wordmark">Pitch<span class="dot">.</span></h1>
    <div class="rule"></div>
    <p class="subtitle">Australia's marketplace for food vendors and events</p>
    <div class="url">ONPITCH.COM.AU</div>
  </div>
</body>
</html>

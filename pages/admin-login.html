<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="64x64" href="/favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <title>Admin — Pitch.</title>
  <link rel="stylesheet" href="/fonts/fonts.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1A1612; color: #FDF4E7; font-family: 'Instrument Sans', sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
    }

    /* ── Initial hidden state — reveal after session check ── */
    .card {
      width: 100%; max-width: 400px;
      background: #231E19; border: 1px solid #2A2018; border-radius: 18px; padding: 40px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03);
      opacity: 0; transform: translateY(8px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .card.visible { opacity: 1; transform: translateY(0); }

    .logo { display: flex; align-items: center; gap: 9px; margin-bottom: 32px; }
    .logo-dot { width: 28px; height: 28px; border-radius: 50%; background: #E8500A; }
    .logo-text { font-family: 'Fraunces', serif; font-size: 20px; color: #FDF4E7; }

    .admin-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(232,80,10,0.12); border: 1px solid rgba(232,80,10,0.25);
      border-radius: 6px; padding: 4px 10px; font-size: 11px; font-weight: 600;
      color: #E8500A; text-transform: uppercase; letter-spacing: 0.08em;
      margin-bottom: 16px;
    }

    h1 { font-family: 'Fraunces', serif; font-size: 26px; color: #FDF4E7; letter-spacing: -0.02em; margin-bottom: 6px; }
    .sub { font-size: 14px; color: #A89880; margin-bottom: 28px; line-height: 1.6; }

    .field-group { margin-bottom: 16px; }
    .field-label { display: block; font-size: 11px; font-weight: 600; color: #A89880; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
    .field-input {
      width: 100%; background: #1A1612; border: 1.5px solid #2A2018; border-radius: 10px;
      color: #FDF4E7; font-family: 'Instrument Sans', sans-serif; font-size: 15px;
      padding: 12px 16px; outline: none; transition: border-color 0.18s ease;
    }
    .field-input:focus { border-color: #E8500A; }
    .field-input::placeholder { color: #4A3C30; }
    .field-input.input-error { border-color: #C0392B; }

    .pw-wrap { position: relative; }
    .pw-toggle {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: #6B5A4A; font-size: 13px;
      font-family: inherit; font-weight: 600; transition: color 0.15s;
    }
    .pw-toggle:hover { color: #A89880; }
    .pw-toggle:focus-visible { outline: 2px solid #E8500A; outline-offset: 2px; border-radius: 4px; }

    .btn-submit {
      width: 100%; background: #E8500A; color: #fff; border: none; border-radius: 10px;
      font-family: 'Instrument Sans', sans-serif; font-size: 15px; font-weight: 600;
      padding: 14px; cursor: pointer; margin-top: 20px;
      transition: background 0.15s ease, transform 0.1s ease, opacity 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-submit:hover { background: #FF6B2B; }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:focus-visible { outline: 2px solid #FF6B2B; outline-offset: 2px; }
    .btn-submit:disabled { background: #3A2E22; color: #6B5A4A; cursor: not-allowed; transform: none; }

    .btn-spinner {
      width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.25);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.5s linear infinite; display: none;
    }
    .btn-submit.loading .btn-spinner { display: block; }
    .btn-submit.loading .btn-label { display: none; }

    .error-box {
      background: rgba(192,57,43,0.1); border: 1px solid rgba(192,57,43,0.3);
      border-radius: 10px; padding: 12px 14px; font-size: 13px; color: #C0392B;
      margin-top: 14px; line-height: 1.5;
      max-height: 0; overflow: hidden; opacity: 0;
      transition: max-height 0.25s ease, opacity 0.2s ease, padding 0.25s ease, margin 0.25s ease;
      padding: 0 14px; margin-top: 0;
    }
    .error-box.show {
      max-height: 80px; opacity: 1; padding: 12px 14px; margin-top: 14px;
    }

    .footer-links { text-align: center; font-size: 13px; color: #6B5A4A; margin-top: 24px; }
    .footer-links a {
      color: #6B5A4A; text-decoration: none; transition: color 0.15s;
    }
    .footer-links a:hover { color: #A89880; }
    .footer-links a:focus-visible { outline: 2px solid #E8500A; outline-offset: 2px; border-radius: 4px; }

    /* ── Shake animation on bad credentials ── */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      15% { transform: translateX(-6px); }
      30% { transform: translateX(5px); }
      45% { transform: translateX(-4px); }
      60% { transform: translateX(3px); }
      75% { transform: translateX(-2px); }
    }
    .shake { animation: shake 0.4s ease; }

    @keyframes spin { to { transform: rotate(360deg); } }

  </style>
</head>
<body>

<div class="card" id="loginCard">
  <div class="logo">
    <div class="logo-dot"></div>
    <span class="logo-text">Pitch.</span>
  </div>

  <div class="admin-badge">
    <svg width="10" height="10" viewBox="0 0 12 12" fill="currentColor"><path d="M6 0L7.5 4.5H12L8.5 7L10 11.5L6 9L2 11.5L3.5 7L0 4.5H4.5L6 0Z"/></svg>
    Admin access only
  </div>

  <h1>Admin sign in</h1>
  <p class="sub">Restricted area. Authorised personnel only.</p>

  <form id="loginForm" autocomplete="on" novalidate>
    <div class="field-group">
      <label class="field-label" for="admin-email">Email</label>
      <input class="field-input" type="email" id="admin-email" name="email" placeholder="admin@onpitch.com.au" autocomplete="username" autofocus />
    </div>

    <div class="field-group">
      <label class="field-label" for="admin-password">Password</label>
      <div class="pw-wrap">
        <input class="field-input" type="password" id="admin-password" name="password" placeholder="Password" autocomplete="current-password" style="padding-right:52px;" />
        <button class="pw-toggle" type="button" tabindex="0" id="pwToggle">Show</button>
      </div>
    </div>

    <div class="error-box" id="admin-error"></div>

    <button class="btn-submit" type="submit" id="admin-btn">
      <span class="btn-label">Sign in</span>
      <div class="btn-spinner"></div>
    </button>
  </form>

  <div class="footer-links" style="margin-top:20px;">
    <a href="/">← Back to Pitch.</a>
  </div>
</div>

<script>
(function() {
  const form     = document.getElementById('loginForm');
  const btn      = document.getElementById('admin-btn');
  const errEl    = document.getElementById('admin-error');
  const emailInp = document.getElementById('admin-email');
  const passInp  = document.getElementById('admin-password');
  const card     = document.getElementById('loginCard');
  const pwToggle = document.getElementById('pwToggle');

  // ── Check existing session first — redirect instantly if already admin ──
  fetch('/api/me', { credentials: 'same-origin' })
    .then(r => r.json())
    .then(d => {
      if (d.user && d.user.role === 'admin') {
        // Already authenticated — go straight to admin
        window.location.href = '/dashboard/loading?to=admin';
      } else {
        // Not authenticated — reveal the login card
        card.classList.add('visible');
        emailInp.focus();
      }
    })
    .catch(() => {
      card.classList.add('visible');
      emailInp.focus();
    });

  // ── Password toggle ──
  pwToggle.addEventListener('click', () => {
    const isHidden = passInp.type === 'password';
    passInp.type = isHidden ? 'text' : 'password';
    pwToggle.textContent = isHidden ? 'Hide' : 'Show';
  });

  // ── Clear error on typing ──
  emailInp.addEventListener('input', clearError);
  passInp.addEventListener('input', clearError);

  function clearError() {
    errEl.classList.remove('show');
    emailInp.classList.remove('input-error');
    passInp.classList.remove('input-error');
  }

  function showError(msg) {
    errEl.textContent = msg;
    errEl.classList.add('show');
    // Shake the card
    card.classList.remove('shake');
    void card.offsetWidth; // force reflow to restart animation
    card.classList.add('shake');
  }

  // ── Form submit ──
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearError();

    const email    = emailInp.value.trim();
    const password = passInp.value;

    if (!email || !password) {
      if (!email) emailInp.classList.add('input-error');
      if (!password) passInp.classList.add('input-error');
      showError('Please enter your email and password.');
      (email ? passInp : emailInp).focus();
      return;
    }

    // Loading state
    btn.classList.add('loading');
    btn.disabled = true;

    try {
      const res = await fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();

      if (!res.ok) {
        showError(data.error || 'Invalid credentials.');
        btn.classList.remove('loading');
        btn.disabled = false;
        passInp.value = '';
        passInp.focus();
        return;
      }

      // Success — redirect through instant loading page
      window.location.href = '/dashboard/loading?to=admin';
    } catch (err) {
      showError('Network error — please check your connection.');
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  });
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset password — Pitch.</title>
  <link rel="stylesheet" href="/fonts/fonts.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1A1612; color: #FDF4E7; font-family: 'Instrument Sans', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }

    .card {
      width: 100%; max-width: 420px;
      background: #231E19; border: 1px solid #2A2018; border-radius: 18px; padding: 40px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03);
    }

    .logo { display: flex; align-items: center; gap: 9px; margin-bottom: 32px; }
    .logo-dot { width: 28px; height: 28px; border-radius: 50%; background: #E8500A; }
    .logo-text { font-family: 'Fraunces', serif; font-size: 20px; color: #FDF4E7; }

    h1 { font-family: 'Fraunces', serif; font-size: 26px; color: #FDF4E7; letter-spacing: -0.02em; margin-bottom: 6px; }
    .sub { font-size: 14px; color: #A89880; margin-bottom: 28px; line-height: 1.6; }

    .field-group { margin-bottom: 16px; }
    .field-label { display: block; font-size: 11px; font-weight: 600; color: #A89880; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
    .field-input {
      width: 100%; background: #1A1612; border: 1.5px solid #2A2018; border-radius: 10px;
      color: #FDF4E7; font-family: 'Instrument Sans', sans-serif; font-size: 15px;
      padding: 12px 16px; outline: none; transition: border-color 0.2s;
    }
    .field-input:focus { border-color: #E8500A; }
    .field-input::placeholder { color: #4A3C30; }

    .btn-submit {
      width: 100%; background: #E8500A; color: #fff; border: none; border-radius: 10px;
      font-family: 'Instrument Sans', sans-serif; font-size: 15px; font-weight: 600;
      padding: 14px; cursor: pointer; margin-top: 20px;
      transition: background 0.18s, transform 0.12s;
    }
    .btn-submit:hover { background: #FF6B2B; }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled { background: #4A3C30; cursor: not-allowed; }

    .error-box {
      display: none; background: rgba(192,57,43,0.1); border: 1px solid rgba(192,57,43,0.3);
      border-radius: 10px; padding: 12px 14px; font-size: 13px; color: #C0392B;
      margin-top: 14px; line-height: 1.5;
    }
    .error-box.show { display: block; }

    .success-box {
      display: none; background: rgba(45,139,85,0.1); border: 1px solid rgba(45,139,85,0.3);
      border-radius: 10px; padding: 16px; font-size: 14px; color: #2D8B55;
      margin-top: 14px; line-height: 1.6; text-align: center;
    }
    .success-box.show { display: block; }
    .success-box .success-icon { font-size: 28px; margin-bottom: 8px; }

    .footer-links { text-align: center; font-size: 13px; color: #6B5A4A; margin-top: 24px; }
    .footer-links a { color: #E8500A; text-decoration: none; font-weight: 600; }
    .footer-links a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="card">
  <a href="/" class="logo" style="text-decoration:none;">
    <div class="logo-dot"></div>
    <span class="logo-text">Pitch.</span>
  </a>

  <div id="form-view">
    <h1>Reset your password</h1>
    <p class="sub">Enter your email address and we'll send you a link to reset your password.</p>

    <div class="field-group">
      <label class="field-label">Email address</label>
      <input class="field-input" type="email" id="reset-email" placeholder="you@example.com.au" autocomplete="email" />
    </div>

    <div class="error-box" id="reset-error"></div>

    <button class="btn-submit" id="reset-btn" onclick="doReset()">Send reset link</button>
  </div>

  <div class="success-box" id="success-view">
    <div class="success-icon">✉️</div>
    <strong>Check your email</strong><br>
    We've sent a password reset link to <span id="sent-email" style="color:#FDF4E7;font-weight:600;"></span>.<br><br>
    <span style="font-size:13px;color:#A89880;">Didn't get it? Check your spam folder, or <a href="/forgot-password" style="color:#E8500A;font-weight:600;text-decoration:none;">try again</a>.</span>
  </div>

  <div class="footer-links" style="margin-top:20px;">
    Remember your password? <a href="/login">Sign in</a>
  </div>

  <div class="footer-links" style="margin-top:8px;">
    <a href="/" style="color:#6B5A4A;font-weight:400;">← Back to Pitch.</a>
  </div>
</div>

<script>
async function doReset() {
  const btn = document.getElementById('reset-btn');
  const errEl = document.getElementById('reset-error');
  errEl.classList.remove('show');

  const email = document.getElementById('reset-email').value.trim();

  if (!email) {
    errEl.textContent = 'Please enter your email address.';
    errEl.classList.add('show');
    return;
  }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    errEl.textContent = 'Please enter a valid email address.';
    errEl.classList.add('show');
    return;
  }

  btn.textContent = 'Sending…';
  btn.disabled = true;

  try {
    const res = await fetch('/api/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email }),
    });
    // Show success regardless of whether email exists (security best practice)
    document.getElementById('form-view').style.display = 'none';
    document.getElementById('sent-email').textContent = email;
    document.getElementById('success-view').style.display = 'block';
  } catch (e) {
    errEl.textContent = 'Network error — please check your connection.';
    errEl.classList.add('show');
    btn.textContent = 'Send reset link';
    btn.disabled = false;
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') doReset();
});
</script>
</body>
</html>

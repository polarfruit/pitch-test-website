<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Pitch.</title>
  <link rel="stylesheet" href="/fonts/fonts.css">
  <link rel="stylesheet" href="/fonts/fonts.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1A1612; color: #FDF4E7; font-family: 'Instrument Sans', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }

    .card {
      width: 100%; max-width: 420px;
      background: #231E19; border: 1px solid #2A2018; border-radius: 18px; padding: 40px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03);
    }

    .logo { display: flex; align-items: center; gap: 9px; margin-bottom: 32px; }
    .logo-dot { width: 28px; height: 28px; border-radius: 50%; background: #E8500A; }
    .logo-text { font-family: 'Fraunces', serif; font-size: 20px; color: #FDF4E7; }

    h1 { font-family: 'Fraunces', serif; font-size: 26px; color: #FDF4E7; letter-spacing: -0.02em; margin-bottom: 6px; }
    .sub { font-size: 14px; color: #A89880; margin-bottom: 28px; line-height: 1.6; }

.field-group { margin-bottom: 16px; }
    .field-label { display: block; font-size: 11px; font-weight: 600; color: #A89880; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
    .field-input {
      width: 100%; background: #1A1612; border: 1.5px solid #2A2018; border-radius: 10px;
      color: #FDF4E7; font-family: 'Instrument Sans', sans-serif; font-size: 15px;
      padding: 12px 16px; outline: none; transition: border-color 0.2s;
    }
    .field-input:focus { border-color: #E8500A; }
    .field-input::placeholder { color: #4A3C30; }

    .pw-wrap { position: relative; }
    .pw-toggle {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: #6B5A4A; font-size: 13px;
      font-family: inherit; font-weight: 600;
    }
    .pw-toggle:hover { color: #A89880; }

    .forgot { display: block; text-align: right; font-size: 12px; color: #6B5A4A; text-decoration: none; margin-top: 6px; }
    .forgot:hover { color: #E8500A; }

    .btn-submit {
      width: 100%; background: #E8500A; color: #fff; border: none; border-radius: 10px;
      font-family: 'Instrument Sans', sans-serif; font-size: 15px; font-weight: 600;
      padding: 14px; cursor: pointer; margin-top: 20px;
      transition: background 0.18s, transform 0.12s;
    }
    .btn-submit:hover { background: #FF6B2B; }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled { background: #4A3C30; cursor: not-allowed; }

    .error-box {
      display: none; background: rgba(192,57,43,0.1); border: 1px solid rgba(192,57,43,0.3);
      border-radius: 10px; padding: 12px 14px; font-size: 13px; color: #C0392B;
      margin-top: 14px; line-height: 1.5;
    }
    .error-box.show { display: block; }

    .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
    .divider hr { flex: 1; border: none; border-top: 1px solid #2A2018; }
    .divider span { font-size: 12px; color: #4A3C30; }

    .sso-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .sso-btn {
      display: flex; align-items: center; justify-content: center; gap: 7px;
      background: #1A1612; border: 1.5px solid #2A2018; border-radius: 10px;
      padding: 10px 14px; font-size: 13px; font-weight: 500; color: #A89880;
      cursor: pointer; transition: border-color 0.15s, color 0.15s; font-family: inherit;
    }
    .sso-btn:hover { border-color: #3A2E26; color: #FDF4E7; }

    .footer-links { text-align: center; font-size: 13px; color: #6B5A4A; margin-top: 24px; }
    .footer-links a { color: #E8500A; text-decoration: none; font-weight: 600; }
    .footer-links a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="card">
  <a href="/" class="logo" style="text-decoration:none;">
    <div class="logo-dot"></div>
    <span class="logo-text">Pitch.</span>
  </a>

  <h1>Welcome back</h1>
  <p class="sub">Sign in to your Pitch. account.</p>

<div class="sso-btns" style="margin-bottom:20px;">
    <button class="sso-btn">
      <svg width="16" height="16" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.616z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
      Google
    </button>
    <button class="sso-btn">
      <svg width="16" height="16" viewBox="0 0 18 18" fill="currentColor"><path d="M12.257 0c.07.93-.263 1.857-.776 2.536-.513.68-1.35 1.213-2.2 1.143-.097-.93.307-1.9.793-2.493C10.573.557 11.47.053 12.257 0zM15.68 12.58c-.38.88-.563 1.27-1.053 2.047-.683 1.04-1.647 2.337-2.843 2.347-.853.01-1.133-.557-2.357-.55-1.22.007-1.527.563-2.387.553-1.193-.013-2.107-1.19-2.79-2.23C2.487 12.51 2.013 9.623 3.073 7.933c.74-1.207 1.903-1.913 3.12-1.913.94 0 1.813.62 2.433.62.61 0 1.55-.707 2.693-.707.447 0 1.73.077 2.547 1.173-.07.043-1.52.89-1.503 2.66.017 2.11 1.853 2.81 1.87 2.817-.017.05-.29.997-1.553 1.997z"/></svg>
      Apple
    </button>
  </div>

  <div class="divider"><hr/><span>or sign in with email</span><hr/></div>

  <div class="field-group">
    <label class="field-label">Email address</label>
    <input class="field-input" type="email" id="login-email" placeholder="you@example.com.au" autocomplete="email" />
  </div>

  <div class="field-group">
    <label class="field-label">Password</label>
    <div class="pw-wrap">
      <input class="field-input" type="password" id="login-password" placeholder="Your password" autocomplete="current-password" style="padding-right:52px;" />
      <button class="pw-toggle" type="button" onclick="togglePw()">Show</button>
    </div>
    <a href="#" class="forgot">Forgot password?</a>
  </div>

  <div class="error-box" id="login-error"></div>

  <button class="btn-submit" id="login-btn" onclick="doLogin()">Sign in</button>

  <div class="footer-links" style="margin-top:20px;">
    Don't have an account?
    <a href="#" id="signup-link">Sign up as a vendor</a>
  </div>

  <div class="footer-links" style="margin-top:8px;">
    <a href="/" style="color:#6B5A4A;font-weight:400;">← Back to Pitch.</a>
  </div>
</div>

<script>
function togglePw() {
    const inp = document.getElementById('login-password');
    const btn = document.querySelector('.pw-toggle');
    inp.type = inp.type === 'password' ? 'text' : 'password';
    btn.textContent = inp.type === 'password' ? 'Show' : 'Hide';
  }

  async function doLogin() {
    const btn = document.getElementById('login-btn');
    const errEl = document.getElementById('login-error');
    errEl.classList.remove('show');

    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;

    if (!email || !password) {
      errEl.textContent = 'Please enter your email and password.';
      errEl.classList.add('show');
      return;
    }

    btn.textContent = 'Signing in…';
    btn.disabled = true;

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!res.ok) {
        errEl.textContent = data.error || 'Sign in failed. Please try again.';
        errEl.classList.add('show');
        btn.textContent = 'Sign in';
        btn.disabled = false;
        return;
      }
      window.location.href = data.redirect;
    } catch (e) {
      errEl.textContent = 'Network error — please check your connection.';
      errEl.classList.add('show');
      btn.textContent = 'Sign in';
      btn.disabled = false;
    }
  }

  // Allow Enter key to submit
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  // Pre-select role and set signup link from query params
  const params = new URLSearchParams(window.location.search);
  const roleParam = params.get('role');
  if (roleParam === 'organiser') {
    setRole('organiser', document.querySelectorAll('.role-tab')[1]);
  }
  if (params.get('redirect')) {
    document.querySelector('.sub').textContent = 'Sign in to continue.';
  }
</script>
</body>
</html>
